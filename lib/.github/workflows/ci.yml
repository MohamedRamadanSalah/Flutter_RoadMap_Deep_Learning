name: Flutter CI
on:
  pull_request:
    branches: [main]
jobs:  
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Cache pub packages
        uses: actions/cache@v3
        with: 
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Build APK
        run: flutter build apk --release
  # ↑ Builds the release APK for Android
  # ↑ If you skip this, there’s no APK to upload

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release-apk
          path: build/app/outputs/apk/release/app-release.apk
            # ↑ Saves the APK as an artifact named app-release-apk
            # ↑ If you skip this, you can’t download the APK from the workflow
            # ↑ If path is wrong, upload fails and no artifact is saved
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test